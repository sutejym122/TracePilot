services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracepilot
      POSTGRES_PASSWORD: tracepilot
      POSTGRES_DB: tracepilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracepilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override host references so the container talks to the compose services,
      # not localhost. These win over .env values.
      DATABASE_URL: postgresql+psycopg://tracepilot:tracepilot@db:5432/tracepilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
